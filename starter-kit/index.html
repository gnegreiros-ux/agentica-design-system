<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentica — Starter kit</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="page-header">
    <div class="logo">
      <img src="./assets/logo-color-white.svg" alt="Agentica" class="logo-dark" height="28" width="28">
      <img src="./assets/logo-color.svg" alt="" aria-hidden="true" class="logo-light" height="28" width="28">
      <h1>Agentica starter kit</h1>
    </div>
    <agtc-button id="theme-toggle" variant="secondary">Switch to dark</agtc-button>
  </header>

  <main class="page-content">
    <agtc-card variant="elevated">
      <h2>Create an account</h2>
      <p>Minimal example combining Agentica tokens and components.</p>

      <agtc-input label="Full name" name="fullname"></agtc-input>
      <agtc-input label="Email" name="email" type="email"></agtc-input>

      <div class="badges">
        <agtc-badge variant="success">Available</agtc-badge>
        <agtc-badge variant="warning">Beta</agtc-badge>
      </div>

      <div class="actions">
        <agtc-button variant="primary">Create account</agtc-button>
        <agtc-button variant="secondary">Cancel</agtc-button>
      </div>
    </agtc-card>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
