<?xml version="1.0" encoding="UTF-8"?>
<!--
  Illustration : Le dernier mot est humain
  Style : Diagramme de gouvernance fonctionnel · dark · ADR-051
  Brouillon v3 — en attente d'approbation humaine
-->
<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"
