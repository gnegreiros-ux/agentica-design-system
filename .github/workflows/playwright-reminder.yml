name: Playwright — Visual review reminder

# Automatically creates a GitHub Issue labeled `visual-review` when component
# files (`components/`) are modified on main.
# Goal: alert designers that a Playwright visual review is available
# (`playwright-report-chromium` artifact) before approving the visual change.
#
# The Playwright workflow (playwright.yml) must have run on the same push for
# the artifact to be available. Thanks to `needs` (optional here), the issue is
# created after the playwright job — not before.
#
# Required configuration: the `actions/github-script` action uses the GITHUB_TOKEN
# token (available automatically). No additional secret needed.

on:
  push:
    branches: [main]
    paths:
      - 'components/**'

permissions:
  contents: read
  issues: write

jobs:
  create-visual-review-issue:
    name: Create visual review issue
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: List modified components
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- components/ | sed 's|components/||' | sort -u | tr '\n' ', ' | sed 's/,$//')
          echo "components=${CHANGED}" >> $GITHUB_OUTPUT

      - name: Ensure the visual-review label exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'visual-review',
                color: '7057ff',
                description: 'Playwright visual review required before approval',
              });
            } catch (e) {
              // Label already exists — that's fine
              if (!e.message.includes('already_exists') && e.status !== 422) throw e;
            }

      - name: Create the visual review issue
        uses: actions/github-script@v7
        with:
          script: |
            const run_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commit = context.sha.substring(0, 7);
            const components = '${{ steps.changes.outputs.components }}';
            const report_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `## Visual review required`,
              ``,
              `Commit \`${commit}\` modified components: **${components || 'see below'}**`,
              ``,
              `The Playwright workflow generated a visual comparison report.`,
              ``,
              `### Steps for designers`,
              ``,
              `1. Open the [Playwright report](${report_url})`,
              `2. Download the \`playwright-report-chromium\` artifact`,
              `3. Open \`index.html\` in a browser`,
              `4. Compare the "actual" vs "expected" captures in the visual section`,
              `5. If the change is intentional → close this issue and request \`update_snapshots\``,
              `6. If it's a regression → comment and notify the DS team`,
              ``,
              `### Updating the reference snapshots`,
              ``,
              `\`\`\``,
              `# Via GitHub Actions (human approval required — ADR-066)`,
              `Actions → Playwright → workflow_dispatch → update_snapshots: true`,
              ``,
              `# Locally`,
              `npm run playwright:update`,
              `git add tests/visual/snapshots/`,
              `git commit -m "test(visual): update reference snapshots"`,
              `\`\`\``,
              ``,
              `---`,
              `*Issue created automatically by \`.github/workflows/playwright-reminder.yml\`*`,
            ].join('\n');

            // Check whether an open `visual-review` issue already exists for this commit
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'visual-review',
              state: 'open',
            });

            if (existing.data.length > 0) {
              // Add a comment on the existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `**New component change — commit \`${commit}\`**\n\nModified components: ${components || 'see diff'}\n\n[Playwright report →](${report_url})`,
              });
              console.log(`Comment added on issue #${existing.data[0].number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🎨 Visual review — ${components || 'components'} (${commit})`,
                body,
                labels: ['visual-review'],
              });
              console.log(`Issue #${issue.data.number} created: ${issue.data.html_url}`);
            }
