name: Chromatic — Visual regression

# Component visual regression tests (ADR-006).
# The token lives in the CHROMATIC_PROJECT_TOKEN GitHub secret — never in plaintext in the repo.

on:
  # Push disabled — free monthly snapshot limit reached (2026-07-02).
  # Re-run manually before each release or major visual review.
  # push:
  #   branches: [main, develop]
  # pull_request:
  #   paths:
  #     - 'components/**'
  #     - 'tokens/**'
  #     - '.storybook/**'
  #     - 'package.json'
  #     - 'package-lock.json'
  #     - '.github/workflows/chromatic.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Chromatic compares against the baseline — full git history required

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        # npm install (not npm ci): the root lockfile carries cross-platform coverage,
        # but a transitive edge (@emnapi/core) with an unresolved node fails npm ci's
        # strict mode. npm install reconciles and installs the native Linux binaries
        # required by the Storybook build.
        run: npm install --no-audit --no-fund

      - name: Build tokens (Style Dictionary)
        # Generates dist/tokens/css/all.css with the --agtc-component-* vars required by the Web Components.
        # Without this step, Storybook components render unstyled (unresolved tokens).
        run: npm run tokens

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true # a visual diff doesn't block CI — a human approves in Chromatic
