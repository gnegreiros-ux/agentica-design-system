name: Build & Deploy — Agentic Design System

on:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
      - 'decisions/**'
      - 'guidelines/**'
      - 'site/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        # npm install (not npm ci) at the repo root: site is now an npm workspaces
        # member, so there is no site/package-lock.json anymore — same rationale as
        # the other workflows' root installs (multi-platform lockfile reconciliation).
        run: npm install --no-audit --no-fund

      - name: Build site
        working-directory: site
        run: node build.js

      - name: Audit WCAG 2.2
        working-directory: site
        run: node audit-a11y.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/dist
          publish_branch: gh-pages
          cname: agentica.design
