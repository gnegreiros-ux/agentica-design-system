name: Release — npm publish

# ADR-074. Requires a one-time manual setup step (cannot be done by CI or an
# agent): create an npm Automation token scoped to the agentica-ds org
# (npmjs.com -> Access Tokens -> Generate New Token -> Automation), then add
# it as a repository secret named NPM_TOKEN
# (Settings -> Secrets and variables -> Actions -> New repository secret).
# An Automation token bypasses the interactive OTP/WebAuthn challenge that
# blocks unattended CI publishing with a normal login session.

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.changeset/**'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # npm install (not npm ci) at the repo root — same multi-platform
        # lockfile rationale as the other workflows.
        run: npm install --no-audit --no-fund

      - name: Build @agentica-ds/tokens package content
        run: npm run tokens

      - name: Build @agentica-ds/components package content
        run: npm run build:components-package

      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
