name: Playwright — Visual, functional and accessibility tests

# Visual regression, functional, and accessibility tests for the site (ADR-066 + ADR-007).
# Scope: site/dist/ pages — not Storybook stories.
# Replaces axe.yml for critical pages — axe.yml remains for the manual exhaustive audit.
# Reference PNG snapshots are committed in tests/visual/snapshots/.
#
# Merged HTML report published to the /playwright-report/ subdirectory of the Pages site.
# URL: https://designsystem.gnegreiros.com/playwright-report/
# Deployed to gh-pages via peaceiris/actions-gh-pages (same mechanism as deploy-site.yml).
# keep_files: true — doesn't touch the rest of the site.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        type: boolean
        default: false
        description: >
          Regenerate the reference snapshots.
          HUMAN APPROVAL REQUIRED — never enable automatically (ADR-066, ADR-004).

permissions:
  contents: write

jobs:
  playwright:
    name: Playwright (${{ matrix.browser }})
    runs-on: ubuntu-latest

    # Microsoft Docker image — deterministic diffs between Linux CI and local macOS.
    # Without this image, typographic differences between OSes generate false positives.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        # npm install (not npm ci): aligned with the other workflows — cross-platform lockfile
        run: npm install --no-audit --no-fund

      - name: Build tokens
        # Required for the CSS custom properties used by the agtc-* components
        run: npm run tokens

      - name: Build site
        run: node site/build.js

      - name: Run Playwright tests
        env:
          # HOME must point to a writable directory inside the Docker container
          HOME: /root
        run: |
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            echo "⚠️  Snapshot update mode — human approval required before committing"
            npx playwright test --project=${{ matrix.browser }} --update-snapshots --reporter=blob,html
          else
            npx playwright test --project=${{ matrix.browser }} --reporter=blob,html
          fi

      - name: Upload per-browser HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

      - name: Upload blob report (for multi-browser merge)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.browser }}
          path: blob-report/
          retention-days: 1

      - name: Upload updated snapshots
        if: ${{ inputs.update_snapshots == true }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-updated-${{ matrix.browser }}
          path: tests/visual/snapshots/
          retention-days: 7

  publish-report:
    name: Publish report → designsystem.gnegreiros.com/playwright-report/
    needs: playwright
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install @playwright/test (for merge-reports)
        run: npm install --no-save @playwright/test

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge multi-browser reports
        run: npx playwright merge-reports --reporter html all-blob-reports

      - name: Publish to /playwright-report/ (without touching the rest of the site)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          publish_branch: gh-pages
          destination_dir: playwright-report
          keep_files: true

      - name: Report published — viewing URL
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅  Playwright report published"
          echo ""
          echo "  👉  https://designsystem.gnegreiros.com/playwright-report/"
          echo ""
          echo "  The report will be available in ~30 seconds"
          echo "  (GitHub Pages propagation delay)."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
