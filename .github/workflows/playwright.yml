name: Playwright — Tests visuels, fonctionnels et accessibilité

# Tests de régression visuelle, fonctionnels et accessibilité du site (ADR-066 + ADR-007).
# Périmètre : pages site/dist/ — pas les stories Storybook.
# Remplace axe.yml pour les pages critiques — axe.yml reste pour l'audit exhaustif manuel.
# Les snapshots PNG de référence sont committés dans tests/visual/snapshots/.
#
# Rapport HTML fusionné publié dans le sous-répertoire /playwright-report/ du site Pages.
# URL : https://designsystem.gnegreiros.com/playwright-report/
# Déployé dans gh-pages via peaceiris/actions-gh-pages (même mécanisme que deploy-site.yml).
# keep_files: true — ne touche pas au reste du site.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        type: boolean
        default: false
        description: >
          Régénérer les snapshots de référence.
          APPROBATION HUMAINE REQUISE — ne jamais activer automatiquement (ADR-066, ADR-004).

permissions:
  contents: write

jobs:
  playwright:
    name: Playwright (${{ matrix.browser }})
    runs-on: ubuntu-latest

    # Image Docker Microsoft — diffs déterministes entre CI Linux et macOS local.
    # Sans cette image, les différences typographiques entre OS génèrent des faux positifs.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        # npm install (non npm ci) : aligné sur les autres workflows — lockfile multi-plateforme
        run: npm install --no-audit --no-fund

      - name: Build tokens
        # Requis pour les custom properties CSS utilisées par les composants agtc-*
        run: npm run tokens

      - name: Build site
        run: node site/build.js

      - name: Run Playwright tests
        env:
          # HOME doit pointer vers un répertoire inscriptible dans le container Docker
          HOME: /root
        run: |
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            echo "⚠️  Mode mise à jour des snapshots — approbation humaine requise avant de committer"
            npx playwright test --project=${{ matrix.browser }} --update-snapshots --reporter=blob,html
          else
            npx playwright test --project=${{ matrix.browser }} --reporter=blob,html
          fi

      - name: Upload rapport HTML par browser
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

      - name: Upload blob report (pour la fusion multi-browser)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.browser }}
          path: blob-report/
          retention-days: 1

      - name: Upload snapshots mis à jour
        if: ${{ inputs.update_snapshots == true }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-updated-${{ matrix.browser }}
          path: tests/visual/snapshots/
          retention-days: 7

  publish-report:
    name: Publier rapport → designsystem.gnegreiros.com/playwright-report/
    needs: playwright
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install @playwright/test (pour merge-reports)
        run: npm install --no-save @playwright/test

      - name: Télécharger tous les blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Fusionner les rapports multi-browser
        run: npx playwright merge-reports --reporter html all-blob-reports

      - name: Publier dans /playwright-report/ (sans toucher au reste du site)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          publish_branch: gh-pages
          destination_dir: playwright-report
          keep_files: true
