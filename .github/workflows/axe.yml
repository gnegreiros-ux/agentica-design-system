name: axe-core — Audit complet (manuel)

# DÉPRÉCIÉ pour le CI automatique — l'audit axe-core est désormais intégré dans
# playwright.yml via tests/functional/accessibility.spec.js (ADR-066).
#
# Ce workflow reste disponible pour les sessions de burn-down manuelles :
#   - Audit exhaustif de TOUTES les pages (pas seulement les pages critiques)
#   - 3 contextes : desktop-light, mobile-light, desktop-dark
#   - Rapport JSON complet dans axe-report.json
#
# Pour l'audit de base (pages critiques × 2 thèmes → rapport HTML Playwright),
# voir playwright.yml qui s'exécute à chaque push sur main.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        # npm install (et non npm ci) : aligné sur le workflow Chromatic — le lockfile
        # racine est multi-plateforme et npm install réconcilie les binaires Linux.
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: node site/build.js

      - name: Audit axe-core (mode rapport)
        env:
          AXE_BLOCKING: 'false'
        run: npm run axe

      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: axe-report.json
