name: axe-core — Full audit (manual)

# DEPRECATED for automatic CI — the axe-core audit is now integrated into
# playwright.yml via tests/functional/accessibility.spec.js (ADR-066).
#
# This workflow remains available for manual burn-down sessions:
#   - Exhaustive audit of ALL pages (not just critical pages)
#   - 3 contexts: desktop-light, mobile-light, desktop-dark
#   - Full JSON report in axe-report.json
#
# For the baseline audit (critical pages × 2 themes → Playwright HTML report),
# see playwright.yml, which runs on every push to main.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        # npm install (not npm ci): aligned with the Chromatic workflow — the root
        # lockfile is cross-platform and npm install reconciles the Linux binaries.
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: node site/build.js

      - name: Audit axe-core (report mode)
        env:
          AXE_BLOCKING: 'false'
        run: npm run axe

      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: axe-report.json
